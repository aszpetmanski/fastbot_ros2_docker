version: '2.4'

services:
  fastbot-ros2-gazebo:
    build:
      context: ../../..
      dockerfile: src/fastbot_ros2_docker/simulation/Dockerfile.fastbot-ros2-gazebo
    image: alanszpetmanski/alan.szpetmanski-cp22:fastbot-ros2-gazebo
    container_name: fastbot-ros2-gazebo
    hostname: fastbot-ros2-gazebo
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      DISPLAY: ${DISPLAY}
      ROS_DOMAIN_ID: '42'
      QT_X11_NO_MITSHM: '1'
      LIBGL_ALWAYS_SOFTWARE: '0'
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    networks:
      - fastbot-net

  fastbot-ros2-slam:
    build:
      context: ../../..
      dockerfile: src/fastbot_ros2_docker/simulation/Dockerfile.fastbot-ros2-slam
    image: alanszpetmanski/alan.szpetmanski-cp22:fastbot-ros2-slam
    container_name: fastbot-ros2-slam
    hostname: fastbot-ros2-slam
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      - fastbot-ros2-gazebo
    environment:
      DISPLAY: ${DISPLAY}
      ROS_DOMAIN_ID: '42'
      QT_X11_NO_MITSHM: '1'
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    networks:
      - fastbot-net

  fastbot-ros2-webapp:
    build:
      context: ../../../..
      dockerfile: ros2_ws/src/fastbot_ros2_docker/simulation/Dockerfile.fastbot-ros2-webapp
    image: alanszpetmanski/alan.szpetmanski-cp22:fastbot-ros2-webapp
    container_name: fastbot-ros2-webapp
    hostname: fastbot-ros2-webapp
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      - fastbot-ros2-gazebo
      - fastbot-ros2-slam
    environment:
      ROS_DOMAIN_ID: '42'
    ports:
      - "7000:80"
      - "9090:9090"
    networks:
      - fastbot-net

networks:
  fastbot-net:
    driver: bridge